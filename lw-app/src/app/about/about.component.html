<div class="page-shell">
    <section class="content-card stack">
        <div class="page-heading">
            <h1>{{i18n.text().about.title}}</h1>
            <p>{{i18n.text().about.intro}}</p>
        </div>

        <div class="row g-3">
            <div class="col-md-6">
                <h2 class="h5">{{i18n.text().about.helpsTitle}}</h2>
                <ul class="list-unstyled stack-sm mb-0">
                    <li *ngFor="let item of helpItems">{{item}}</li>
                </ul>
            </div>
            <div class="col-md-6">
                <h2 class="h5">{{i18n.text().about.technologyTitle}}</h2>
                <ul class="list-unstyled stack-sm mb-0">
                    <li *ngFor="let item of technologyItems">{{item}}</li>
                </ul>
            </div>
        </div>

        <div class="border-top pt-3 text-muted small">
            {{i18n.text().about.version}} {{version}} · © {{year}} {{i18n.text().common.brand}}. {{i18n.text().footer.rights}}
        </div>
    </section>
</div>
