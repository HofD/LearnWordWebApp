<div class="stack">
  <article *ngFor="let card of cards; index as i" class="content-card word-card">
    <div class="word-card-header">
      <span class="word-card-meta">{{i18n.text().cards.card}} · {{card.words.length}} {{card.words.length === 1 ? i18n.text().cards.word : i18n.text().cards.words}}</span>
      <button type="button" class="word-card-delete" data-bs-toggle="modal" [attr.data-bs-target]="'#deleteModal' + card.id" [attr.aria-label]="i18n.text().cards.deleteThisCard"></button>
    </div>
    <app-card [card]="card" [collectionId]="collectionId" (onCardRemoved)="removeCard($event)"></app-card>
    <div class="modal fade" id="deleteModal{{card.id}}" tabindex="-1" [attr.aria-labelledby]="'deleteModalLabel' + card.id" aria-hidden="true">
      <div class="modal-dialog modal-sm">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="deleteModalLabel{{card.id}}">{{i18n.text().cards.deleteThisCardQuestion}}</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" [attr.aria-label]="i18n.text().common.close"></button>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">{{i18n.text().common.close}}</button>
            <button (click)="delete(card.id!, i)" type="button" data-bs-dismiss="modal" class="btn btn-danger">{{i18n.text().common.delete}}</button>
          </div>
        </div>
      </div>
    </div>
  </article>

  <section class="content-card add-card-panel">
    <div class="add-card-heading">
      <h2 class="h5 mb-1">{{i18n.text().cards.addTitle}}</h2>
      <p class="text-muted mb-0">{{i18n.text().cards.addIntro}}</p>
    </div>
    <app-card [collectionId]="collectionId" (onCardAdded)="addCard($event)"></app-card>
  </section>
</div>
