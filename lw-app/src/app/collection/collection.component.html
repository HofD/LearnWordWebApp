<div class="container-fluid">
    <div *ngIf="!loaded">
        <div class="d-flex justify-content-center">
            <div class="spinner-border" role="status"></div>
        </div>
    </div>
    <div *ngIf="loaded">
        <h5>{{collection.name}}</h5>
        <app-cards [cards]="collection.cards" [collectionId]="collection.id"></app-cards>
    </div>
</div>
