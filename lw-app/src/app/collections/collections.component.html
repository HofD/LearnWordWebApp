<div class="page-shell stack">
    <div class="page-heading">
        <h1>Collections</h1>
        <p>Organize words into small groups, then review them when you are ready.</p>
    </div>

    <div *ngIf="!loaded" class="spinner-page">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <ng-container *ngIf="loaded">
        <div *ngIf="collections.length > 0" class="stack">
            <article class="content-card collection-card" *ngFor="let collection of collections">
                <div class="collection-card-layout">
                    <div class="collection-summary">
                        <h2 class="h5 mb-1">{{collection.name}}</h2>
                        <p class="text-muted mb-0">Cards in this collection: {{collection.cardsCount}}</p>
                    </div>
                    <div class="collection-actions">
                        <a routerLink="/collections/{{collection.id}}" class="btn btn-dark btn-sm">Open</a>
                        <a routerLink="/review/{{collection.id}}" class="btn btn-outline-secondary btn-sm">Review</a>
                        <button type="button" class="btn btn-outline-danger btn-sm" data-bs-toggle="modal" [attr.data-bs-target]="'#deleteModal' + collection.id">Delete</button>
                    </div>
                </div>
                <div class="modal fade" id="deleteModal{{collection.id}}" tabindex="-1" [attr.aria-labelledby]="'deleteModalLabel' + collection.id" aria-hidden="true">
                    <div class="modal-dialog modal-sm">
                      <div class="modal-content">
                        <div class="modal-header">
                          <h1 class="modal-title fs-5" id="deleteModalLabel{{collection.id}}">Delete {{collection.name}}?</h1>
                          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-footer">
                          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
                          <button (click)="delete(collection.id)" type="button" data-bs-dismiss="modal" class="btn btn-danger">Delete</button>
                        </div>
                      </div>
                    </div>
                </div>
            </article>
        </div>

        <form class="content-card stack-sm" [formGroup]="newCollectionForm" (ngSubmit)="add()">
            <div>
                <label for="name" class="form-label">New collection name</label>
                <input formControlName="name" type="text" class="form-control" id="name" placeholder="For example, Travel">
            </div>
            <div class="form-actions">
                <button [disabled]="!newCollectionForm.valid" type="submit" class="btn btn-dark">Create Collection</button>
            </div>
        </form>

        <div *ngIf="collections.length == 0" class="empty-state text-center">
            <h2 class="h5">No collections yet</h2>
            <p class="text-muted mb-0">Create your first collection above and start adding words.</p>
        </div>
    </ng-container>
</div>
