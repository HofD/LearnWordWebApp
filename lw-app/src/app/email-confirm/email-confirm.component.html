<div class="page-shell-narrow">
    <section class="content-card stack">
        <div class="page-heading mb-0">
            <h1>{{i18n.text().emailConfirm.title}}</h1>
        </div>
        <div *ngIf="emailStatus == EmailStatus.Verifying" class="text-muted">
            {{i18n.text().emailConfirm.verifying}}
        </div>
        <div *ngIf="emailStatus == EmailStatus.Failed" class="text-muted">
            {{i18n.text().emailConfirm.failedPrefix}} <a routerLink="/forgot-password">{{i18n.text().emailConfirm.forgotPasswordLink}}</a> {{i18n.text().emailConfirm.failedSuffix}}
        </div>
    </section>
</div>
