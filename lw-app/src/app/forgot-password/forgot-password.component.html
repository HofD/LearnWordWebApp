<div class="page-shell-narrow">
    <form class="auth-panel stack" [formGroup]="forgotPasswordForm" (ngSubmit)="sendResetInstructions()">
        <div class="page-heading mb-0">
            <h1>Reset Password</h1>
            <p>Enter your email and we will send reset instructions if the account exists.</p>
        </div>
        <div *ngIf="instructionsSent" class="alert alert-success mb-0" role="status">
            If an account exists for this email, password reset instructions were sent.
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input formControlName="email" type="email" class="form-control" id="email" placeholder="name@example.com"
                autocomplete="email" [ngClass]="{ 'is-invalid': validateControl('email') }">
            <div *ngIf="validateControl('email') && hasError('email', 'required')" class="invalid-feedback">Email is
                required</div>
            <div *ngIf="validateControl('email') && hasError('email', 'email')" class="invalid-feedback">Email must be a
                valid email address</div>
        </div>
        <div class="form-actions">
            <button [disabled]="!forgotPasswordForm.valid || submitting" type="submit" class="btn btn-dark">
                {{ submitting ? 'Sending...' : 'Send Instructions' }}
            </button>
            <a routerLink="/login" class="btn btn-outline-secondary">Back to Login</a>
        </div>
    </form>
</div>
