<div class="page-shell-narrow">
    <form class="auth-panel stack" [formGroup]="forgotPasswordForm" (ngSubmit)="sendResetInstructions()">
        <div class="page-heading mb-0">
            <h1>{{i18n.text().password.resetTitle}}</h1>
            <p>{{i18n.text().password.resetIntro}}</p>
        </div>
        <div *ngIf="instructionsSent" class="alert alert-success mb-0" role="status">
            {{i18n.text().password.instructionsSent}}
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">{{i18n.text().password.email}}</label>
            <input formControlName="email" type="email" class="form-control" id="email" [placeholder]="i18n.text().common.emailPlaceholder"
                autocomplete="email" [ngClass]="{ 'is-invalid': validateControl('email') }">
            <div *ngIf="validateControl('email') && hasError('email', 'required')" class="invalid-feedback">{{i18n.text().password.emailRequired}}</div>
            <div *ngIf="validateControl('email') && hasError('email', 'email')" class="invalid-feedback">{{i18n.text().password.emailInvalid}}</div>
        </div>
        <div class="form-actions">
            <button [disabled]="!forgotPasswordForm.valid || submitting" type="submit" class="btn btn-dark">
                {{ submitting ? i18n.text().password.sending : i18n.text().password.sendInstructions }}
            </button>
            <a routerLink="/login" class="btn btn-outline-secondary">{{i18n.text().password.backToLogin}}</a>
        </div>
    </form>
</div>
