<div *ngIf="messages.length" class="page-shell">
    <div class="mb-3">
        <div *ngFor="let msg of messages" class="{{cssClasses(msg)}}">
            <span [innerHTML]="msg.message"></span>
            <button class="btn-close" (click)="removeMessage(msg)" [attr.aria-label]="i18n.text().common.close"></button>
        </div>
    </div>
</div>
