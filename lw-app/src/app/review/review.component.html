<div class="page-shell-focus stack">
    <div class="page-heading">
        <h1>Review</h1>
        <p>Move through the cards one by one and mark what needs more practice.</p>
    </div>

    <div *ngIf="!loaded" class="spinner-page">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div *ngIf="loaded">
        <div *ngIf="currentCard && currentCard.words && currentCard.words.length > 0" class="content-card review-card stack">
                <div class="progress">
                    <div class="progress-bar" role="progressbar" 
                         [style.width.%]="(currentIndex + 1) / cards.length * 100"
                         [attr.aria-valuenow]="(currentIndex + 1) / cards.length * 100"
                         aria-valuemin="0" 
                         aria-valuemax="100">
                        {{currentIndex + 1}} / {{cards.length}}
                    </div>
                </div>

                <div class="review-word text-center">
                    <div class="word-container">
                        <h2 class="card-title">{{currentCard.words[0].value}}</h2>
                        <p class="card-text text-muted mb-0">
                            {{currentCard.transcription}}
                        </p>
                    </div>

                    <button type="button" class="translation-container" (click)="toggleTranslation()">
                        <p *ngIf="!showTranslation" class="card-text lead text-muted mb-0">
                            Show Translation
                        </p>
                        <p *ngIf="showTranslation" class="card-text lead mb-0">
                            {{currentCard.words[0].translation}}
                        </p>
                    </button>
                </div>

                <div class="review-actions">
                    <button (click)="onForget()" class="btn btn-outline-danger">
                        Forget
                    </button>
                    <button (click)="onLearn()" class="btn btn-success">
                        Learn
                    </button>
                </div>
        </div>

        <div *ngIf="!currentCard || !currentCard.words || currentCard.words.length === 0" class="empty-state text-center stack">
            <div>
                <h2 class="h5">No Cards to Review</h2>
                <p class="text-muted mb-0">There are no cards available for review in this collection.</p>
            </div>
            <div class="form-actions justify-content-center">
                <a routerLink="/collections" class="btn btn-dark">Back to Collections</a>
            </div>
        </div>
    </div>
</div>
